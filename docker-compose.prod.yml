version: '3.8'

services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  backend:
    image: ${BACKEND_IMAGE:-myorg/backend:latest}
    build:
      context: ./back-end
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE:-myorg/frontend:latest}
    build:
      context: ./front-end
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      - backend
    restart: unless-stopped

  proxy:
    image: nginx:stable-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./front-end/dist:/usr/share/nginx/html:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  mongo-data:
  redis-data:

networks:
  default:
    driver: bridge
